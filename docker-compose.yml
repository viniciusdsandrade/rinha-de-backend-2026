services:
  api1: &api
    build:
      context: .
      dockerfile: Dockerfile
    image: rinha-backend-2026-cpp-api:local
    environment:
      UNIX_SOCKET_PATH: /sockets/api1.sock
      IVF_FAST_NPROBE: "1"
      IVF_FULL_NPROBE: "1"
      IVF_BOUNDARY_FULL: "false"
      IVF_BBOX_REPAIR: "true"
      IVF_REPAIR_MIN_FRAUDS: "0"
      IVF_REPAIR_MAX_FRAUDS: "5"
    networks:
      - backend
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.26"
          memory: "110MB"

  api2:
    <<: *api
    environment:
      UNIX_SOCKET_PATH: /sockets/api2.sock
      IVF_FAST_NPROBE: "1"
      IVF_FULL_NPROBE: "1"
      IVF_BOUNDARY_FULL: "false"
      IVF_BBOX_REPAIR: "true"
      IVF_REPAIR_MIN_FRAUDS: "0"
      IVF_REPAIR_MAX_FRAUDS: "5"

  api3:
    <<: *api
    environment:
      UNIX_SOCKET_PATH: /sockets/api3.sock
      IVF_FAST_NPROBE: "1"
      IVF_FULL_NPROBE: "1"
      IVF_BOUNDARY_FULL: "false"
      IVF_BBOX_REPAIR: "true"
      IVF_REPAIR_MIN_FRAUDS: "0"
      IVF_REPAIR_MAX_FRAUDS: "5"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api1
      - api2
      - api3
    ports:
      - "9999:9999"
    networks:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.22"
          memory: "20MB"

networks:
  backend:
    driver: bridge

volumes:
  sockets:
