services:
  api1: &api
    build:
      context: .
      dockerfile: Dockerfile
    image: rinha-backend-2026-api:local
    expose:
      - "3000"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "165MB"

  api2:
    <<: *api

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api1
      - api2
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "20MB"

networks:
  backend:
    driver: bridge
