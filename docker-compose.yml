services:
  api1: &api
    build:
      context: .
      dockerfile: Dockerfile
    image: rinha-backend-2026-api:local
    environment:
      UNIX_SOCKET_PATH: /sockets/api1.sock
    networks:
      - backend
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "165MB"

  api2:
    <<: *api
    environment:
      UNIX_SOCKET_PATH: /sockets/api2.sock

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    networks:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "20MB"

networks:
  backend:
    driver: bridge

volumes:
  sockets:
