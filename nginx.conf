worker_processes 1;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

stream {
    upstream api {
        server api1:3000;
        server api2:3000;
    }

    server {
        listen 9999 reuseport backlog=4096;
        proxy_connect_timeout 1s;
        proxy_timeout 30s;
        proxy_pass api;
    }
}
