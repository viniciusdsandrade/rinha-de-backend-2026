worker_processes 1;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

stream {
    upstream api {
        server unix:/sockets/api1.sock;
        server unix:/sockets/api2.sock;
        server unix:/sockets/api3.sock;
    }

    server {
        listen 9999 reuseport backlog=4096;
        proxy_connect_timeout 1s;
        proxy_timeout 30s;
        proxy_pass api;
    }
}
