name: Auto-merge participant submission

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

# Permissões são concedidas por job. O job `smoke-test` executa o
# docker-compose do participante e por isso roda SEM permissões elevadas —
# assim o token/secrets não ficam ao alcance de código não confiável.
permissions: {}

# Cancela runs anteriores do mesmo PR ao abrir uma nova — evita pilha de
# runners executando compose do participante em paralelo a cada push.
concurrency:
  group: auto-merge-participant-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      issues: write
    outputs:
      should_merge: ${{ steps.validate.outputs.should_merge }}
      repos: ${{ steps.validate.outputs.repos }}
    steps:
      - name: Validate PR structure
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh label create "needs human review" \
            --repo "$REPO" \
            --color "FBCA04" \
            --force >/dev/null 2>&1 || true

          touches_participants=0
          COMMENT_MARKER="<!-- auto-merge-bot -->"

          skip() {
            echo "$1"
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "needs human review" || true
            if [ "$touches_participants" = "1" ]; then
              gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
                --jq ".[] | select(.body | contains(\"$COMMENT_MARKER\")) | .id" \
                | while read -r cid; do
                    gh api -X DELETE "repos/$REPO/issues/comments/$cid" >/dev/null 2>&1 || true
                  done
              printf -v body '%s\n:warning: **Auto-merge pulou este PR:** %s\n\nEste PR foi marcado com a label `needs human review`. Após corrigir, um novo push vai re-executar a validação automaticamente.' "$COMMENT_MARKER" "$1"
              gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body" || true
            fi
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
            echo "repos=[]" >> "$GITHUB_OUTPUT"
            exit 0
          }

          files=$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename')
          file_count=$(printf '%s\n' "$files" | grep -c . || true)

          if printf '%s\n' "$files" | grep -qE '^participants/.+\.json$'; then
            touches_participants=1
          fi

          echo "Changed files ($file_count):"
          printf '%s\n' "$files"

          if [ "$file_count" -ne 1 ]; then
            skip "Expected exactly 1 changed file, got $file_count. Skipping auto-merge."
          fi

          expected="participants/${PR_AUTHOR}.json"
          if [ "$files" != "$expected" ]; then
            skip "Expected file '$expected', got '$files'. Skipping auto-merge."
          fi

          content=$(gh api "repos/$REPO/contents/$expected?ref=$PR_HEAD_SHA" --jq '.content' | base64 -d)

          if ! printf '%s' "$content" | jq empty 2>/dev/null; then
            skip "File is not valid JSON."
          fi

          if ! printf '%s' "$content" | jq -e '
            type == "array"
            and length > 0
            and all(.[];
              type == "object"
              and (keys | sort) == ["id", "repo"]
              and (.id | type == "string")
              and (.id | length > 0)
              and (.repo | type == "string")
              and (.repo | test("^(https?://|git@)"))
            )
          ' >/dev/null 2>&1; then
            skip "JSON does not match expected schema: [{id: string, repo: git-url}, ...]."
          fi

          total=$(printf '%s' "$content" | jq 'length')
          unique=$(printf '%s' "$content" | jq '[.[].id] | unique | length')
          if [ "$total" != "$unique" ]; then
            skip "Duplicate 'id' values in JSON."
          fi

          # Cap no número de repos — cada um vira uma entrada no matrix do
          # smoke-test (runner por entrada). Evita abuso via JSON enorme.
          if [ "$total" -gt 5 ]; then
            skip "Too many repos in JSON ($total); maximum is 5."
          fi

          while IFS= read -r repo_url; do
            if ! heads=$(timeout 15 git ls-remote --heads "$repo_url" 2>/dev/null); then
              skip "Repo '$repo_url' is unreachable, timed out, or not a valid git repository."
            fi
            if [ -z "$heads" ]; then
              skip "Repo '$repo_url' has no branches."
            fi
            branch_count=$(printf '%s\n' "$heads" | wc -l | tr -d ' ')
            if [ "$branch_count" -lt 2 ]; then
              skip "Repo '$repo_url' has only $branch_count branch; needs at least 2."
            fi
            if ! printf '%s\n' "$heads" | grep -q 'refs/heads/submission$'; then
              skip "Repo '$repo_url' does not contain a 'submission' branch."
            fi
          done < <(printf '%s' "$content" | jq -r '.[].repo')

          repos_json=$(printf '%s' "$content" | jq -c '[.[].repo]')
          echo "All checks passed. Repos to smoke-test: $repos_json"
          echo "should_merge=true" >> "$GITHUB_OUTPUT"
          echo "repos=$repos_json" >> "$GITHUB_OUTPUT"

  smoke-test:
    needs: validate
    if: needs.validate.outputs.should_merge == 'true'
    runs-on: ubuntu-latest
    # Cap total de minutos de runner por entrada do matrix — contém compose
    # malicioso com sleep infinito, build travado ou loop no init.
    timeout-minutes: 10
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.validate.outputs.repos) }}
    steps:
      - name: Checkout rinha repo (for test/smoke.js)
        uses: actions/checkout@v4
        with:
          # Não persistir o GITHUB_TOKEN em .git/config — o docker compose do
          # participante pode bind-mountar o host filesystem e ler o workspace.
          persist-credentials: false

      - name: Clone participant submission branch
        env:
          REPO_URL: ${{ matrix.repo }}
        run: |
          set -euo pipefail
          timeout 120 git clone --branch submission --depth 1 "$REPO_URL" participant-repo
          ls -la participant-repo
          # Docker Compose procura, nessa ordem: compose.yaml, compose.yml,
          # docker-compose.yaml, docker-compose.yml. Basta UM deles existir.
          found=0
          for f in compose.yaml compose.yml docker-compose.yaml docker-compose.yml; do
            if [ -f "participant-repo/$f" ]; then
              echo "Using compose file: $f"
              found=1
              break
            fi
          done
          if [ "$found" = "0" ]; then
            echo "No compose file found at submission branch root (expected one of: compose.yaml, compose.yml, docker-compose.yaml, docker-compose.yml)"
            exit 1
          fi

      - name: Start participant stack
        working-directory: participant-repo
        # Cap em build+pull+up. Se estourar, o teardown final ainda roda.
        run: timeout 300 docker compose up -d

      - name: Wait for /ready
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:9999/ready; then
              echo "/ready is up (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: /ready not ready yet"
            sleep 3
          done
          echo "Backend never became ready on http://localhost:9999/ready"
          (cd participant-repo && docker compose logs) || true
          exit 1

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run smoke test
        run: k6 run test/smoke.js

      - name: Dump participant logs on failure
        if: failure()
        working-directory: participant-repo
        run: docker compose logs || true

      - name: Teardown participant stack
        if: always()
        working-directory: participant-repo
        run: docker compose down -v || true

  smoke-test-report:
    needs: [validate, smoke-test]
    if: always() && needs.validate.outputs.should_merge == 'true' && needs.smoke-test.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Label and comment smoke failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          SMOKE_MARKER="<!-- smoke-test-bot -->"

          gh label create "smoke test failed" \
            --repo "$REPO" \
            --color "D93F0B" \
            --force >/dev/null 2>&1 || true

          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "smoke test failed" || true

          gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
            --jq ".[] | select(.body | contains(\"$SMOKE_MARKER\")) | .id" \
            | while read -r cid; do
                gh api -X DELETE "repos/$REPO/issues/comments/$cid" >/dev/null 2>&1 || true
              done

          printf -v body '%s\n:x: **Smoke test failed.** The backend did not respond correctly on `/ready` + `/fraud-score` from the `submission` branch.\n\nSee the full log: %s\n\nFix the issue and push again — the validation will run automatically.' "$SMOKE_MARKER" "$RUN_URL"
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body" || true

  merge:
    needs: [validate, smoke-test]
    if: needs.validate.outputs.should_merge == 'true' && needs.smoke-test.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Squash merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Smoke test passed. Merging PR #$PR_NUMBER."
          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash

  # Único job que toca NOTIFYME_ACCESSCODE. Rodar APÓS todo o pipeline e
  # NUNCA no mesmo job em que código do participante é executado. `environment:
  # default` força opt-in: se o secret estiver guardado no Environment (e não
  # no repo), nenhum outro job consegue lê-lo por engano.
  notify:
    needs: [validate, merge]
    if: >
      always()
      && (needs.merge.result == 'success'
          || (needs.validate.result == 'success' && needs.validate.outputs.should_merge == 'false'))
    runs-on: ubuntu-latest
    timeout-minutes: 3
    environment: default
    permissions: {}
    steps:
      - name: Send notification
        env:
          NOTIFYME_ACCESSCODE: ${{ secrets.NOTIFYME_ACCESSCODE }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MERGE_RESULT: ${{ needs.merge.result }}
          PARTICIPANTS_API: https://api.github.com/repos/${{ github.repository }}/contents/participants?ref=main
        run: |
          set -euo pipefail
          if [ "$MERGE_RESULT" = "success" ]; then
            # Conta arquivos *.json em participants/ no main pós-merge.
            # API pública + repo público → sem auth, logo sem expor GITHUB_TOKEN.
            # Fallback "?" se a chamada falhar (rate-limit, rede): notificação ainda sai.
            total=$(curl -sSf "$PARTICIPANTS_API" 2>/dev/null \
              | jq '[.[] | select(.name | endswith(".json"))] | length' 2>/dev/null \
              || echo "?")
            msg="PR auto-mergeado na Rinha de Backend por ${PR_AUTHOR}, número ${PR_NUMBER} — total de participantes: ${total}"
          else
            msg="PR de ${PR_AUTHOR}, número ${PR_NUMBER} precisa de review humano na Rinha"
          fi
          payload=$(jq -n \
            --arg n "$msg" \
            --arg c "$NOTIFYME_ACCESSCODE" \
            '{notification: $n, accessCode: $c}')
          curl -sS --fail-with-body -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            https://api.notifymyecho.com/v1/NotifyMe
