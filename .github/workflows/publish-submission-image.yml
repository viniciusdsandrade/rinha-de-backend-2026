name: Publish submission image

on:
  workflow_dispatch:
  push:
    branches:
      - perf/ivf-index
      - perf/noon-tuning

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}:submission
            ghcr.io/${{ github.repository }}:submission-4260b14
            ghcr.io/${{ github.repository }}:submission-a9e49db
            ghcr.io/${{ github.repository }}:submission-1273343
            ghcr.io/${{ github.repository }}:submission-322cc1d
            ghcr.io/${{ github.repository }}:submission-e63ae1a
            ghcr.io/${{ github.repository }}:submission-9ddccaf
            ghcr.io/${{ github.repository }}:submission-a5ef277
            ghcr.io/${{ github.repository }}:submission-cd3e915
            ghcr.io/${{ github.repository }}:submission-a477d55
            ghcr.io/${{ github.repository }}:submission-60daa3d
            ghcr.io/${{ github.repository }}:submission-67270c2
            ghcr.io/${{ github.repository }}:submission-e950b12
