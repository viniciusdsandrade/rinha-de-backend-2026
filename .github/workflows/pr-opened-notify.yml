name: Notify on PR Opened

# Usamos pull_request_target (e não pull_request) para que PRs vindos de forks
# também disparem com acesso aos secrets. Isso SÓ é seguro porque este workflow
# não faz checkout nem executa código do PR. NÃO adicione `actions/checkout` do
# ref do PR aqui — isso exporia secrets/token a código não confiável do fork.
on:
  pull_request_target:
    types: [opened]
  workflow_dispatch:
    inputs:
      pr_title:
        default: "Teste manual"
      pr_author:
        default: "zanfranceschi"
      pr_number:
        default: "0"

jobs:
  notify:
    runs-on: ubuntu-latest
    environment: default
    steps:
      - name: Send request with secret token
        env:
          NOTIFYME_ACCESSCODE: ${{ secrets.NOTIFYME_ACCESSCODE }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PR_TITLE: ${{ github.event.pull_request.title || inputs.pr_title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login || inputs.pr_author }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          payload=$(jq -n \
            --arg title "$PR_TITLE" \
            --arg author "$PR_AUTHOR" \
            --arg number "$PR_NUMBER" \
            --arg code "$NOTIFYME_ACCESSCODE" \
            '{
              notification: "Novo PR para Rinha: \($title) de \($author), PR número \($number)!!!",
              accessCode: $code
            }')
          curl -sS --fail-with-body -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            https://api.notifymyecho.com/v1/NotifyMe
